name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release XNet›
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Build App (Ad-Hoc Unsigned)
        run: |
          xcodebuild -scheme "XNet›" \
                     -project "XNet›.xcodeproj" \
                     -configuration Release \
                     -destination 'platform=macOS' \
                     CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=YES CODE_SIGNING_ALLOWED=YES \
                     clean build \
                     SYMROOT=$PWD/build

      - name: Create DMG
        run: |
          mkdir -p dist
          # Copia o App direto da pasta de build controlada que acabamos de definir
          cp -R "build/Release/XNet›.app" dist/
          
          # Create DMG using hdiutil
          hdiutil create -volname "XNet›" \
                         -srcfolder dist/ \
                         -ov -format UDZO \
                         "XNet›-Installer.dmg"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: XNet›-Installer.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
